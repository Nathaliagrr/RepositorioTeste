<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>CSS Flag Project</title>
  <style>
    .flag {
        width: 900px;
        font-weight: 600px;
        background-color: #ce1126;
        position: relative;
        margin: 0;

    }

    .flag > div {
        width: 900px;
        font-weight: 300px;
        position: absolute;
        background-color: #002868;
        top:150px;

    }

    .flag > div > div {
        width: 200px;
        font-weight: 200px;
        border-radius: 50%;
        position: relative;
        background-color: #ffffff;
        top: 50px;
        margin: 0 auto;

    }

    .flag p {
        text-align: center;
        color: #000000;
        margin: 0;
        padding-top: 20px;
        font-size: 2rem;
    }

    .flag > div > div p {
        padding-top: 80px;
        font-size: 1.5rem;
    }

    /* Escreva seu CSS Aqui */
    
  </style>
</head>

<body>
  <div class="flag">
    <p>The Flag</p>
    <div>
      <div>
        <p>of Laos</p>
      </div>
    </div>
  </div>
</body>

</html>
